<circle cx="126.1" cy="331.0" r="6.2" fill="#14B8A6" opacity="0.95"/>
<circle cx="106.0" cy="256.0" r="6.2" fill="#14B8A6" opacity="0.95"/>
<circle cx="126.1" cy="181.0" r="6.2" fill="#14B8A6" opacity="0.95"/>
<circle cx="181.0" cy="126.1" r="6.2" fill="#14B8A6" opacity="0.95"/>
