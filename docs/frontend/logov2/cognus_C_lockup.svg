  <rect width="900" height="980" rx="60" fill="#FFFFFF"/>

  <!-- Icon -->
  <g transform="translate(194,90)">
    <defs>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#14B8A6" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#2563EB" stop-opacity="1"/>
    </radialGradient>

    <linearGradient id="cubeTopGrad" x1="-20" y1="-20" x2="20" y2="10" gradientUnits="userSpaceOnUse">
      <stop stop-color="#14B8A6" stop-opacity="1"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="1"/>
    </linearGradient>

    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0B1220" flood-opacity="0.18"/>
    </filter>

    
    <g id="cube">
      <polygon points="0.00,-13.20 12.00,-6.60 0.00,0.00 -12.00,-6.60" fill="url(#cubeTopGrad)" stroke="#0B1220" stroke-opacity="0.10" stroke-width="1.2"/>
      <polygon points="0.00,0.00 -12.00,-6.60 -12.00,6.60 0.00,13.20" fill="#2563EB" opacity="0.96" stroke="#0B1220" stroke-opacity="0.10" stroke-width="1.2"/>
      <polygon points="0.00,0.00 12.00,-6.60 12.00,6.60 0.00,13.20" fill="#7C3AED" opacity="0.90" stroke="#0B1220" stroke-opacity="0.10" stroke-width="1.2"/>
      <path d="M 0 0 L 12.00 -6.60" stroke="#FFFFFF" stroke-opacity="0.35" stroke-width="1.2" stroke-linecap="round"/>
      <path d="M 0 0 L -12.00 -6.60" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1.2" stroke-linecap="round"/>
    </g>
    
  </defs>

